name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  lint-django:
    name: Lint · Django
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black

      - name: flake8
        run: flake8 . --max-line-length=100 --exclude=migrations

      - name: black
        run: black --check --line-length=100 --exclude="migrations" .

  lint-node:
    name: Lint · Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/

      - name: TypeScript check
        run: npx tsc --noEmit

  lint-dashboard:
    name: Lint · Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_NODE_SERVICE_URL: http://localhost:4000

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-django, lint-node, lint-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Django image
        uses: docker/build-push-action@v5
        with:
          context: ./django-service
          push: false
          tags: hybrid-systems/django:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Node image
        uses: docker/build-push-action@v5
        with:
          context: ./node-service
          push: false
          tags: hybrid-systems/node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false
          tags: hybrid-systems/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
