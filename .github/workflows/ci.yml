# .github/workflows/ci.yml
#
# CI/CD pipeline for the Hybrid Systems project.
#
# Triggers:
#   - Every push to any branch      → lint + build checks
#   - Every pull_request to main    → lint + build + Docker image build
#   - Push to main (merge/tag)      → all of the above + image push to ECR
#
# Jobs:
#   lint-django   → flake8 + black check on the Django service
#   lint-node     → ESLint + TypeScript compile check on the Node service
#   lint-dashboard→ ESLint + Next.js build check
#   docker-build  → Build all three images (fails fast on Dockerfile errors)
#   docker-push   → Push images to Amazon ECR (main branch only)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ---------------------------------------------------------------------------
  # 1. Django linting
  # ---------------------------------------------------------------------------
  lint-django:
    name: Lint · Django
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black

      - name: flake8
        run: flake8 . --max-line-length=100 --exclude=migrations

      - name: black (format check)
        run: black --check --line-length=100 . --exclude=migrations

  # ---------------------------------------------------------------------------
  # 2. Node.js linting + TypeScript compile
  # ---------------------------------------------------------------------------
  lint-node:
    name: Lint · Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript compile check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # 3. Dashboard linting + build
  # ---------------------------------------------------------------------------
  lint-dashboard:
    name: Lint · Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_NODE_SERVICE_URL: http://localhost:4000

  # ---------------------------------------------------------------------------
  # 4. Docker image builds (validates Dockerfiles, no push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-django, lint-node, lint-dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Django image
        uses: docker/build-push-action@v5
        with:
          context: ./django-service
          push: false
          tags: hybrid-systems/django:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Node image
        uses: docker/build-push-action@v5
        with:
          context: ./node-service
          push: false
          tags: hybrid-systems/node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false
          tags: hybrid-systems/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 5. Push to ECR (main branch only)
  # ---------------------------------------------------------------------------
  docker-push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Django
        uses: docker/build-push-action@v5
        with:
          context: ./django-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/hybrid-systems-django:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/hybrid-systems-django:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Node
        uses: docker/build-push-action@v5
        with:
          context: ./node-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/hybrid-systems-node:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/hybrid-systems-node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/hybrid-systems-dashboard:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/hybrid-systems-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
