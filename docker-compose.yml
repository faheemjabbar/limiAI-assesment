version: "3.9"

# ---------------------------------------------------------------------------
# Hybrid Systems — docker-compose.yml
#
# Services:
#   postgres    — legacy relational store (Django source of truth)
#   mongo       — new document store (Node.js microservice)
#   redis       — message broker / pub-sub backbone
#   django      — legacy monolith (REST API + admin)
#   node        — new microservice (REST API + Socket.io + sync worker)
#   dashboard   — Next.js real-time monitoring UI
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up postgres mongo   # start only data stores
#   docker compose logs -f node        # tail a specific service
# ---------------------------------------------------------------------------

networks:
  hybrid-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:

services:
  # --------------------------------------------------------------------------
  # Data stores
  # --------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: hs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: legacy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hybrid-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: hs-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: orders_db
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - hybrid-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hs-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - hybrid-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Application services
  # --------------------------------------------------------------------------

  django:
    build:
      context: ./django-service
      dockerfile: Dockerfile
    container_name: hs-django
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: "change-me-in-production"
      DEBUG: "True"
      POSTGRES_DB: legacy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: "localhost,django"
    ports:
      - "8000:8000"
    networks:
      - hybrid-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py loaddata fixtures/sample_orders.json || true &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  node:
    build:
      context: ./node-service
      dockerfile: Dockerfile
    container_name: hs-node
    restart: unless-stopped
    environment:
      PORT: "4000"
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/orders_db
      REDIS_URL: redis://redis:6379/0
      DJANGO_URL: http://django:8000
      DASHBOARD_URL: http://localhost:3000
      SYNC_INTERVAL_MS: "10000"
      SYNC_BATCH_SIZE: "50"
      METRICS_INTERVAL_MS: "5000"
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    networks:
      - hybrid-net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: hs-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_NODE_SERVICE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    networks:
      - hybrid-net
    depends_on:
      node:
        condition: service_healthy
